<section class="min-h-[calc(100vh-4rem)] bg-slate-50">
    <div class="mx-auto max-w-3xl px-4 py-10">

        <!-- Register Form -->
        <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200 sm:p-8">

            <!-- HEADER -->
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-slate-900">Create Member Account</h1>
                <p class="mt-1 text-sm text-slate-600">
                    Admin-only action. This creates a standard member account.
                </p>
            </div>

            <!-- FORM -->
            <form #form="ngForm" (ngSubmit)="createMember(form)" class="space-y-4">

                <!-- Display Name -->
                <div>
                    <label class="block text-sm font-medium text-slate-700">Display Name</label>
                    <input type="text" class="input w-full rounded-xl border border-slate-200 bg-white px-3 py-2"
                        name="displayName" [(ngModel)]="model.displayName" required />
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-slate-700">Email</label>
                    <input type="email" class="input w-full rounded-xl border border-slate-200 bg-white px-3 py-2"
                        name="email" [(ngModel)]="model.email" required />
                </div>

                <!-- Password -->
                <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Password</label>
                        <input type="password"
                            class="input w-full rounded-xl border border-slate-200 bg-white px-3 py-2" name="password"
                            [(ngModel)]="model.password" required />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700">Confirm Password</label>
                        <input type="password"
                            class="input w-full rounded-xl border border-slate-200 bg-white px-3 py-2"
                            name="confirmPassword" [(ngModel)]="model.confirmPassword" required />
                    </div>
                </div>

                <!-- Date of Birth -->
                <div>
                    <label class="block text-sm font-medium text-slate-700">Date of Birth</label>
                    <input type="date" class="input w-full rounded-xl border border-slate-200 bg-white px-3 py-2" s
                        name="dateOfBirth" [(ngModel)]="model.dateOfBirth" required />
                </div>

                <!-- Contact -->
                <div>
                    <label class="block text-sm font-medium text-slate-700">Contact Number</label>
                    <input type="text" class="input w-full rounded-xl border border-slate-200 bg-white px-3 py-2"
                        name="contactNumber" [(ngModel)]="model.contactNumber" required />
                </div>

                <!-- Address -->
                <div>
                    <label class="block text-sm font-medium text-slate-700">Home Address</label>
                    <input type="text" class="input w-full rounded-xl border border-slate-200 bg-white px-3 py-2"
                        name="homeAddress" [(ngModel)]="model.homeAddress" required />
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">City</label>
                    <input type="text" class="input w-full rounded-xl border border-slate-200 bg-white px-3 py-2"
                        name="homeCity" [(ngModel)]="model.homeCity" required />
                </div>

                <!-- SUBMIT -->
                <button type="submit" [disabled]="loading || form.invalid"
                    class="mt-4 inline-flex w-full items-center justify-center rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 disabled:opacity-60">
                    {{ loading ? 'Creating member…' : 'Create Member' }}
                </button>

            </form>

        </div>
    </div>
</section>
