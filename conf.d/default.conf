server {
    listen 80;
    server_name boenainvestmentfund.com www.boenainvestmentfund.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name boenainvestmentfund.com www.boenainvestmentfund.com;

    ssl_certificate /etc/letsencrypt/live/boenainvestmentfund.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boenainvestmentfund.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Angular frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API
    location /api/ {
        proxy_pass http://boena-api:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL
    location /graphql {
        proxy_pass http://boena-api:8080/graphql;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger
    location /swagger/ {
        proxy_pass http://boena-api:8080/swagger/;
    }
}
