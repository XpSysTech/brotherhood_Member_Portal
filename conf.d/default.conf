server {
    listen 80;
    server_name boenainvestmentfund.com www.boenainvestmentfund.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name boenainvestmentfund.com www.boenainvestmentfund.com;

    ssl_certificate /etc/letsencrypt/live/boenainvestmentfund.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boenainvestmentfund.com/privkey.pem;

    location = / {
        return 302 /swagger/index.html;
    }
    
    location / {
        proxy_pass http://boena-api:8080;
        proxy_http_version 1.1;
    
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
